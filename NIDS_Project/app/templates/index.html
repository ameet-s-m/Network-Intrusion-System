<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NIDS Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ IMPORTANT FIX -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

    <div class="header">
        <h1>🔐 NIDS Security Dashboard</h1>
    </div>

    <div id="alertBanner" class="alert hidden">
        🚨 INTRUSION DETECTED
    </div>

    <div class="card">
        <h2>Network Traffic Input</h2>

        <div class="grid">
            <input type="number" id="duration" placeholder="Duration">
            <input type="number" id="src_bytes" placeholder="Source Bytes">
            <input type="number" id="dst_bytes" placeholder="Destination Bytes">

            <select id="protocol_type">
                <option value="0">TCP</option>
                <option value="1">UDP</option>
                <option value="2">ICMP</option>
            </select>

            <select id="flag">
                <option value="0">SF</option>
                <option value="1">S0</option>
                <option value="2">REJ</option>
            </select>
        </div>

        <button onclick="predict()">Analyze Traffic</button>
        <button onclick="startSimulation()">⚡ Start Simulation</button>
        <button onclick="stopSimulation()">⛔ Stop Simulation</button>
    </div>

    <div class="result" id="resultBox">Result will appear here</div>
    <div class="confidence" id="confidenceBox"></div>

    <div class="card chart-card">
        <h2>📈 Live Detection Timeline</h2>
        <canvas id="lineChart"></canvas>
    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
